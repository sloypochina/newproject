<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');

        body { 
            background: #050505; 
            color: white; 
            overflow: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
            margin: 0; 
            min-height: 100vh;
        }

        .video-bg {
            position: fixed; inset: 0; z-index: -10;
            width: 100vw; height: 100vh;
            object-fit: cover;
            filter: blur(15px) brightness(0.5);
        }

        .static-flower { position: absolute; font-size: 24px; z-index: -5; opacity: 0.4; }

        /* Падающие лепестки */
        .flower-emoji { position: absolute; pointer-events: none; animation: float linear infinite; font-size: 25px; z-index: 1; }
        @keyframes float { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

        /* Текст с высоким приоритетом (поверх фото) */
        #glitch-text {
            position: fixed; top: 30%; left: 5%; z-index: 9999;
            font-size: 4rem; font-weight: 900;
            display: none; 
            animation: blink 0.2s infinite, tilt-anim 3s infinite ease-in-out; 
            pointer-events: none;
            text-shadow: 5px 5px 0px #ff00ff, -5px -5px 0px #00ffff;
        }
        @keyframes blink { 0%, 100% { color: #fff; } 50% { color: #ff00ff; } }
        @keyframes tilt-anim {
            0% { transform: rotate(30deg); }
            50% { transform: rotate(-30deg); }
            100% { transform: rotate(30deg); }
        }

        .btn-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; border: 2px solid #ff69b4; background: rgba(255, 105, 180, 0.2);
            font-size: 1.5rem; cursor: pointer; transition: 0.3s; z-index: 1000;
        }
        .btn-center:hover { background: #ff69b4; color: black; }

        /* Фотографии с ограниченным z-index, чтобы не перекрывать текст */
        .popup-media { position: absolute; width: 250px; border: 2px solid white; box-shadow: 0 0 20px red; display: none; z-index: 50; }
        .close-btn { position: fixed; top: 20px; right: 20px; font-size: 50px; color: red; cursor: pointer; z-index: 10000; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="img/bg.mp4" type="video/mp4">
    </video>
    
    <div id="static-flowers-container"></div>

    <h1 class="text-center text-4xl mt-10 uppercase tracking-widest text-pink-400">Liza s 8 marta epta</h1>

    <button id="main-btn" class="btn-center" onclick="startChaos()">с 8 mArata.exe</button>

    <div id="glitch-text">СССС 8 МАРТАА БАЛЯЯЯ ЛИЗА ЕПТА'opuim..'</div>
    <div id="close-btn" class="close-btn" onclick="location.reload()">[X]</div>

    <div id="media-container"></div>

    <script>
        // Расширенный набор эмодзи
        const flowersStatic = ['🌸', '🌷', '🌼', '🌺', '🌹', '🌻', '💐', '💮'];
        const flowersFalling = ['🌸', '💫', '💖', '✨', '🌷', '🎀', '🌹', '🍃'];

        // Создаем статичные цветы
        const container = document.getElementById('static-flowers-container');
        for(let i=0; i<40; i++) {
            const f = document.createElement('div');
            f.className = 'static-flower';
            f.innerHTML = flowersStatic[Math.floor(Math.random()*flowersStatic.length)];
            f.style.left = Math.random()*95 + '%';
            f.style.top = Math.random()*95 + '%';
            container.appendChild(f);
        }

        function startChaos() {
            document.getElementById('main-btn').style.display = 'none';
            document.getElementById('glitch-text').style.display = 'block';
            document.getElementById('close-btn').style.display = 'block';
            
            // Спам лепестками (чаще)
            setInterval(createFallingFlower, 80);
            
            // Вывод фото
            spawnMedia('img/photo1.jpg');
            spawnMedia('img/photo2.jpg');
            spawnMedia('img/photo3.jpg');
            spawnMedia('img/photo4.jpg');
            spawnMedia('img/photo5.jpg');
            spawnMedia('img/photo6.jpg');
            spawnMedia('img/photo7.jpg');
            spawnMedia('img/photo8.jpg');
        }

        function createFallingFlower() {
            const el = document.createElement('div');
            el.className = 'flower-emoji';
            el.innerHTML = flowersFalling[Math.floor(Math.random()*flowersFalling.length)];
            el.style.left = Math.random()*100 + 'vw';
            el.style.animationDuration = (Math.random()*3 + 2) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }

        function spawnMedia(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'popup-media';
            img.style.left = Math.random()*60 + 'vw';
            img.style.top = Math.random()*60 + 'vh';
            
            // z-index от 50 до 9000 (ниже чем 9999 у текста)
            img.style.zIndex = Math.floor(Math.random() * 8950) + 50;
            img.style.display = 'block';
            document.getElementById('media-container').appendChild(img);
            
            // Эффект дерганья
            setInterval(() => {
                if (img.style.display === 'block') {
                    img.style.transform = `translate(${Math.random()*40-20}px, ${Math.random()*40-20}px) rotate(${Math.random()*10-5}deg)`;
                }
            }, 150);
        }
    </script>
</body>
</html>
